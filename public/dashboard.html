<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">Dashboard 🔐</span>
      <button class="btn btn-outline-light" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="container mt-5">

    <div class="row justify-content-center">

      <div class="col-md-6">

        <div class="card shadow">

          <div class="card-body text-center">

            <h4 class="card-title mb-3">Bienvenido 👋</h4>

            <!-- INFO USUARIO -->
            <p id="usuarioInfo" class="text-muted">
              Cargando datos...
            </p>

            <!-- BOTÓN -->
            <button class="btn btn-primary mb-3" onclick="cargarDashboard()">
              Cargar información
            </button>

            <!-- RESULTADO -->
            <pre id="resultado" class="bg-dark text-white p-3 rounded text-start small"></pre>

          </div>

        </div>

      </div>

    </div>

  </div>

  <script>
    // ==========================
    // VALIDAR TOKEN AL ENTRAR
    // ==========================
    const token = localStorage.getItem('token');

    if (!token) {
      alert('Debes iniciar sesión');
      window.location.href = '/index.html';
    }

    // ==========================
    // CARGAR DATOS DEL DASHBOARD
    // ==========================
    async function cargarDashboard() {

      try {
        const response = await fetch('http://localhost:3000/dashboard', {
          method: 'GET',
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.mensaje);
        }

        // Mostrar usuario arriba
        document.getElementById('usuarioInfo').innerText =
          `Usuario: ${data.usuario.username} | Rol: ${data.usuario.role}`;

        // Mostrar JSON bonito
        document.getElementById('resultado').innerText =
          JSON.stringify(data, null, 2);

      } catch (error) {
        alert('Error: ' + error.message);
      }
    }

    // ==========================
    // LOGOUT
    // ==========================
    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/index.html';
    }

    cargarDashboard();
  </script>

</body>
</html>
