<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login JWT</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">

      <h3 class="text-center mb-4">Login</h3>

      <!-- ALERTA -->
      <div id="alerta" class="alert d-none" role="alert"></div>

      <!-- FORM -->
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" id="username" class="form-control" placeholder="admin">
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="1234">
      </div>

      <button id="btnLogin" class="btn btn-primary w-100" onclick="login()">
        Ingresar
      </button>

    </div>

  </div>

  <script>
    function mostrarAlerta(mensaje, tipo) {
      const alerta = document.getElementById('alerta');
      alerta.className = `alert alert-${tipo}`;
      alerta.innerText = mensaje;
      alerta.classList.remove('d-none');
    }

    async function login() {

      const btn = document.getElementById('btnLogin');
      btn.disabled = true;
      btn.innerText = 'Ingresando...';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('http://localhost:3000/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {

          // Guardar token
          localStorage.setItem('token', data.token);

          console.log('Token guardado:', data.token);

          mostrarAlerta('Login exitoso ✅', 'success');

          // Redirigir a tu ruta Express
          setTimeout(() => {
            window.location.href = `/dashboard?token=${encodeURIComponent(data.token)}`;
          }, 1000);

        } else {
          mostrarAlerta(data.mensaje || 'Error en login', 'danger');
        }

      } catch (error) {
        mostrarAlerta('Error de conexión con el servidor', 'danger');
      }

      btn.disabled = false;
      btn.innerText = 'Ingresar';
    }
  </script>

</body>
</html>
